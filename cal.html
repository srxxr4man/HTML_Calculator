<!DOCTYPE html>
<html>
<head>
	<title> Calculator </title>
</head>

<body bgcolor="lightblue" align="center">
<h2> Simple Desktop Calculator </h2>

<input id="a" placeholder="First Number">
<input id="b" placeholder="Second Number"><br><br>

<button onclick="res.value= +a.value + +b.value">Add</button>
<button onclick="res.value= a.value - b.value">Subtract</button>
<button onclick="res.value= a.value * b.value">Multiply</button>
<button onclick="res.value= a.value / b.value">Divide</button>

<br><br>

Result: <input id="res" readonly>

</body>
</html>
